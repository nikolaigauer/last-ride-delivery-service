<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Ride Delivery Service</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="controls">
        Use ← → arrow keys to move<br>
        Press SPACEBAR to enter/exit hearse, pickup/drop coffin, or load coffin into hearse<br>
        <span class="dev-only">Append <code>?dev=1</code> to the URL for the corpse editor (C)</span> &middot;
        Press D to toggle Debug Panel
    </div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1000" height="500"></canvas>
        <div id="mission-overlay" class="hidden" aria-live="polite">
            <div class="dispatch-title"></div>
            <div class="dispatch-body"></div>
            <div class="dispatch-instruction"></div>
            <div class="dispatch-dismiss">press <kbd>space</kbd> to continue</div>
        </div>
    </div>

    <!-- Physics engine -->
    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>

    <!-- Load all JS modules -->
    <script src="js/Utils.js"></script>
    <script src="js/Physics.js"></script>
    <script src="js/Input.js"></script>
    <script src="js/Terrain.js"></script>
    <script src="js/Corpse.js"></script>
    <script src="js/Coffin.js"></script>
    <script src="js/Hearse.js"></script>
    <script src="js/Player.js"></script>
    <script src="js/PhoneBooth.js"></script>
    <script src="js/Hospital.js"></script>
    <script src="js/Church.js"></script>
    <script src="js/AudioEngine.js"></script>
    <script src="js/CorpseEditor.js"></script>
    <script src="js/MonologueSystem.js"></script>
    <script src="js/DreamSequence.js"></script>
    <script src="js/Plank.js"></script>
    <script src="js/ChapterManager.js"></script>
    <script src="js/Bridge.js"></script>
    <script src="js/Game.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
